<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f6f7f9;
        }

        .page-shell {
            max-width: 1220px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 12px;
        }

        .product-card {
            min-height: 158px;
        }

        .money {
            font-variant-numeric: tabular-nums;
        }

        .cart-empty {
            min-height: 132px;
        }
    </style>
</head>
<body>
<main class="container page-shell py-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Order Management</h1>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/orders}" th:object="${orderForm}" method="post" id="orderForm">
        <div class="row g-4">
            <section class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h2 class="h5 mb-0">Chọn sản phẩm</h2>
                        <span class="text-secondary small" th:text="${#lists.size(products)} + ' sản phẩm'"></span>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="customerName" class="form-label">Tên khách hàng</label>
                            <input type="text" class="form-control" id="customerName" th:field="*{customerName}" required>
                        </div>

                        <div class="product-grid">
                            <div class="card product-card" th:each="product : ${products}">
                                <div class="card-body d-flex flex-column">
                                    <h3 class="h6 mb-2" th:text="${product.name}"></h3>
                                    <div class="text-primary fw-semibold money"
                                         th:text="${#numbers.formatDecimal(product.price, 1, 0)} + ' VND'"></div>
                                    <div class="text-secondary small mb-3">
                                        Tồn kho: <span th:text="${product.stockQuantity}"></span>
                                    </div>
                                    <button type="button" class="btn btn-outline-primary mt-auto add-product"
                                            th:disabled="${product.stockQuantity <= 0}"
                                            th:attr="data-id=${product.id},data-name=${product.name},data-price=${product.price},data-stock=${product.stockQuantity}">
                                        Chọn
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h2 class="h5 mb-0">Giỏ hàng thanh toán</h2>
                    </div>
                    <div class="card-body">
                        <div class="cart-empty d-flex align-items-center justify-content-center text-secondary border rounded"
                             id="emptyCart">
                            Chưa có sản phẩm nào trong giỏ hàng.
                        </div>

                        <div class="table-responsive d-none" id="cartWrap">
                            <table class="table align-middle mb-0" id="cartTable">
                                <thead>
                                <tr>
                                    <th>Sản phẩm</th>
                                    <th style="width: 96px;">SL</th>
                                    <th class="text-end" style="width: 132px;">Thành tiền</th>
                                    <th style="width: 54px;"></th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="detail, iter : *{details}" class="cart-row"
                                    th:attr="data-id=${detail.productId},data-name=${detail.productName},data-price=${detail.price}">
                                    <td>
                                        <div class="fw-semibold product-name" th:text="${detail.productName}"></div>
                                        <div class="text-secondary small money">
                                            <span class="unit-price"
                                                  th:text="${#numbers.formatDecimal(detail.price, 1, 0)}"></span> VND
                                        </div>
                                        <input type="hidden" class="product-id-input"
                                               th:field="*{details[__${iter.index}__].productId}">
                                        <input type="hidden" class="product-input"
                                               th:field="*{details[__${iter.index}__].productName}">
                                        <input type="hidden" class="price-input"
                                               th:field="*{details[__${iter.index}__].price}">
                                    </td>
                                    <td>
                                        <input type="number" class="form-control form-control-sm quantity-input"
                                               min="1" step="1" th:field="*{details[__${iter.index}__].quantity}" required>
                                    </td>
                                    <td class="text-end money line-total">0 VND</td>
                                    <td>
                                        <button type="button" class="btn btn-outline-danger btn-sm remove-row">Xóa</button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="border-top mt-3 pt-3 d-flex justify-content-between align-items-center">
                            <span class="fw-semibold">Tổng tiền</span>
                            <span class="fs-5 fw-bold money" id="grandTotal">0 VND</span>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-3" id="checkoutButton" disabled>
                            Thanh toán
                        </button>
                    </div>
                </div>

                <div class="card shadow-sm mt-4">
                    <div class="card-header bg-white">
                        <h2 class="h5 mb-0">Đơn hàng đã tạo</h2>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Khách hàng</th>
                                    <th class="text-end">Tổng</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:if="${#lists.isEmpty(orders)}">
                                    <td colspan="3" class="text-center text-secondary py-4">Chưa có đơn hàng.</td>
                                </tr>
                                <tr th:each="order : ${orders}">
                                    <td th:text="${order.id}"></td>
                                    <td>
                                        <div th:text="${order.customerName}"></div>
                                        <div class="text-secondary small"
                                             th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></div>
                                    </td>
                                    <td class="text-end money"
                                        th:text="${#numbers.formatDecimal(order.totalAmount, 1, 0)} + ' VND'"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </form>
</main>

<template id="cartRowTemplate">
    <tr class="cart-row">
        <td>
            <div class="fw-semibold product-name"></div>
            <div class="text-secondary small money"><span class="unit-price"></span> VND</div>
            <input type="hidden" class="product-id-input">
            <input type="hidden" class="product-input">
            <input type="hidden" class="price-input">
        </td>
        <td>
            <input type="number" class="form-control form-control-sm quantity-input" min="1" step="1" value="1" required>
        </td>
        <td class="text-end money line-total">0 VND</td>
        <td>
            <button type="button" class="btn btn-outline-danger btn-sm remove-row">Xóa</button>
        </td>
    </tr>
</template>

<script>
    const tableBody = document.querySelector("#cartTable tbody");
    const template = document.querySelector("#cartRowTemplate");
    const emptyCart = document.querySelector("#emptyCart");
    const cartWrap = document.querySelector("#cartWrap");
    const checkoutButton = document.querySelector("#checkoutButton");
    const formatter = new Intl.NumberFormat("vi-VN", {maximumFractionDigits: 0});

    function formatMoney(value) {
        return `${formatter.format(value)} VND`;
    }

    function findRowByProductId(productId) {
        return Array.from(tableBody.querySelectorAll(".cart-row"))
                .find(row => row.dataset.id === productId);
    }

    function renameRows() {
        tableBody.querySelectorAll(".cart-row").forEach((row, index) => {
            row.querySelector(".product-id-input").name = `details[${index}].productId`;
            row.querySelector(".product-input").name = `details[${index}].productName`;
            row.querySelector(".quantity-input").name = `details[${index}].quantity`;
            row.querySelector(".price-input").name = `details[${index}].price`;
        });
    }

    function recalculate() {
        let grandTotal = 0;
        const rows = tableBody.querySelectorAll(".cart-row");

        rows.forEach(row => {
            const quantityInput = row.querySelector(".quantity-input");
            const quantity = Math.max(Number(quantityInput.value || 1), 1);
            const price = Number(row.dataset.price || 0);
            const lineTotal = quantity * price;

            quantityInput.value = quantity;
            row.querySelector(".line-total").textContent = formatMoney(lineTotal);
            grandTotal += lineTotal;
        });

        document.querySelector("#grandTotal").textContent = formatMoney(grandTotal);
        emptyCart.classList.toggle("d-none", rows.length > 0);
        cartWrap.classList.toggle("d-none", rows.length === 0);
        checkoutButton.disabled = rows.length === 0;
        renameRows();
    }

    function createCartRow(productId, productName, price) {
        const row = template.content.firstElementChild.cloneNode(true);
        row.dataset.id = productId;
        row.dataset.name = productName;
        row.dataset.price = price;
        row.querySelector(".product-name").textContent = productName;
        row.querySelector(".unit-price").textContent = formatter.format(price);
        row.querySelector(".product-id-input").value = productId;
        row.querySelector(".product-input").value = productName;
        row.querySelector(".price-input").value = price;
        return row;
    }

    document.querySelectorAll(".add-product").forEach(button => {
        button.addEventListener("click", () => {
            const productId = button.dataset.id;
            const productName = button.dataset.name;
            const price = Number(button.dataset.price || 0);
            const existingRow = findRowByProductId(productId);

            if (existingRow) {
                const quantityInput = existingRow.querySelector(".quantity-input");
                quantityInput.value = Number(quantityInput.value || 0) + 1;
            } else {
                tableBody.appendChild(createCartRow(productId, productName, price));
            }

            recalculate();
        });
    });

    tableBody.addEventListener("input", recalculate);
    tableBody.addEventListener("click", event => {
        if (!event.target.classList.contains("remove-row")) {
            return;
        }
        event.target.closest(".cart-row").remove();
        recalculate();
    });

    tableBody.querySelectorAll(".cart-row").forEach(row => {
        const price = Number(row.dataset.price || 0);
        row.querySelector(".unit-price").textContent = formatter.format(price);
        row.querySelector(".product-id-input").value = row.dataset.id;
        row.querySelector(".product-input").value = row.dataset.name;
        row.querySelector(".price-input").value = price;
    });

    recalculate();
</script>
</body>
</html>
